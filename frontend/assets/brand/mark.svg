<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="my-gym mark">
  <defs>
    <linearGradient id="mark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6FC0FF"/>
      <stop offset="1" stop-color="#2E97EE"/>
    </linearGradient>
    <linearGradient id="handle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#AEDCFF"/>
      <stop offset="1" stop-color="#6FC0FF"/>
    </linearGradient>
  </defs>

  <!-- mark: G ring + dumbbell crossbar, centered (256,256) -->
  <!-- G ring (open on the right) -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="url(#mark)" stroke-width="58"
          stroke-linecap="round" pathLength="100" stroke-dasharray="78 22"
          transform="rotate(40 256 256)"/>

  <!-- dumbbell crossbar -->
  <rect x="241" y="217" width="23" height="78" rx="10" fill="url(#mark)"/>
  <rect x="356" y="217" width="23" height="78" rx="10" fill="url(#mark)"/>
  <rect x="252" y="245" width="116" height="22" rx="11" fill="url(#handle)"/>
</svg>
