<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="my-gym app icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#181E2A"/>
      <stop offset="1" stop-color="#0A0D12"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6FC0FF"/>
      <stop offset="1" stop-color="#2E97EE"/>
    </linearGradient>
    <linearGradient id="handle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#AEDCFF"/>
      <stop offset="1" stop-color="#6FC0FF"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="58%">
      <stop offset="0" stop-color="#3DA9FC" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#3DA9FC" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- glass squircle tile -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>
  <circle cx="512" cy="512" r="430" fill="url(#glow)"/>
  <rect x="6" y="6" width="1012" height="1012" rx="220" ry="220" fill="none" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="3"/>

  <!-- mark: G ring + dumbbell crossbar, concentric with tile + halo (512,512) -->
  <!-- G ring (open on the right) -->
  <circle cx="512" cy="512" r="300" fill="none" stroke="url(#mark)" stroke-width="116"
          stroke-linecap="round" pathLength="100" stroke-dasharray="78 22"
          transform="rotate(40 512 512)"/>

  <!-- dumbbell crossbar bridging the mouth of the G -->
  <rect x="482" y="434" width="46" height="156" rx="20" fill="url(#mark)"/>
  <rect x="712" y="434" width="46" height="156" rx="20" fill="url(#mark)"/>
  <rect x="505" y="489" width="230" height="44" rx="22" fill="url(#handle)"/>
</svg>
